<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord Resetten — SNOOD Photo Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#141414;--border:#1e1e1e;
      --text:#e8e0d4;--muted:#9e9690;--accent:#e8c547;
      --error:#e05c5c;--success:#4caf7d;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);padding:40px;max-width:420px;width:100%}
    .box img{height:60px;margin-bottom:20px;display:block}
    h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);margin-bottom:6px}
    .subtitle{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:24px}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:12px;transition:border-color 0.2s}
    input:focus{border-color:var(--accent)}
    .btn{width:100%;background:var(--accent);color:#0d0d0d;border:none;padding:14px;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;font-weight:bold;margin-top:4px}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .error{color:var(--error);font-family:'DM Mono',monospace;font-size:11px;padding:10px 14px;background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.25);margin-bottom:12px;display:none}
    .success{color:var(--success);font-family:'DM Mono',monospace;font-size:11px;padding:10px 14px;background:rgba(76,175,125,0.08);border:1px solid rgba(76,175,125,0.25);margin-bottom:12px;display:none}
    .back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:16px}
    .back a{color:var(--accent);text-decoration:none}
  </style>
</head>

  <h2 id="title">WACHTWOORD RESETTEN</h2>
  <div class="subtitle" id="subtitle">SNOOD PHOTO COACH</div>
  <div class="error" id="errEl"></div>
  <div class="success" id="okEl"></div>
  <div id="formDiv">
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord (min. 8 tekens)">
    <input type="password" id="pw2" placeholder="Herhaal nieuw wachtwoord">
    <button class="btn" id="submitBtn" onclick="doReset()">WACHTWOORD INSTELLEN</button>
  </div>
  <div class="back"><a href="/" id="backLink">← Terug naar inloggen</a></div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token');
  var email  = params.get('email');

  // Bepaal terug link op basis van referrer of path
  var backLink = document.getElementById('backLink');
  if (window.location.pathname.includes('expert')) {
    backLink.href = '/expert.html';
  } else {
    backLink.href = '/index.html';
  }

  if (!token || !email) {
    document.getElementById('errEl').textContent = 'Ongeldige reset link. Vraag een nieuwe aan.';
    document.getElementById('errEl').style.display = 'block';
    document.getElementById('formDiv').style.display = 'none';
  }

  function doReset() {
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    var err = document.getElementById('errEl');
    var ok  = document.getElementById('okEl');
    err.style.display = 'none';
    ok.style.display  = 'none';

    if (!pw1 || pw1.length < 8) { err.textContent = 'Wachtwoord minimaal 8 tekens'; err.style.display = 'block'; return; }
    if (pw1 !== pw2) { err.textContent = 'Wachtwoorden komen niet overeen'; err.style.display = 'block'; return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '...';

    fetch('/api/reset', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'confirm', token: token, email: email, password: pw1 })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.disabled = false; btn.textContent = 'WACHTWOORD INSTELLEN';
      if (d.success) {
        document.getElementById('formDiv').style.display = 'none';
        document.getElementById('title').textContent = 'GELUKT!';
        document.getElementById('subtitle').textContent = 'JE WACHTWOORD IS GEWIJZIGD';
        ok.textContent = d.message + ' Je wordt doorgestuurd...';
        ok.style.display = 'block';
        setTimeout(function() { window.location.href = backLink.href; }, 2500);
      } else {
        err.textContent = d.error || 'Er ging iets mis';
        err.style.display = 'block';
      }
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = 'WACHTWOORD INSTELLEN';
      err.textContent = 'Verbindingsfout: ' + e.message;
      err.style.display = 'block';
    });
  }

  // Enter key
  ['pw1','pw2'].forEach(function(id) {
    document.getElementById(id).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doReset();
    });
  });
</script>
</body>
</html>
